# Build PyInstaller GUI bundles (large: includes PyTorch + MegaDetector).
# Runs on version tags and can be run manually from the Actions tab.
#
# Linux is omitted: one-file bundles often exceed GitHub's 2 GiB per-asset limit for releases.
# Linux users should install from PyPI / pip (see README).

name: Build installers

on:
  workflow_dispatch:
    inputs:
      version_label:
        description: "Filename prefix (e.g. v3.0.0). Leave empty to read version from pyproject.toml."
        required: false
        default: ""
  push:
    tags:
      - "v*"

concurrency:
  group: build-installers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gui:
    name: GUI (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows + macOS only (GitHub release assets max 2 GiB; Linux PyInstaller + torch is often larger).
        # Build both macOS architectures: Intel (x64) and Apple Silicon (arm64).
        include:
          - os: windows-latest
            label: windows-x64
            asset_suffix: Windows-x64.exe
          - os: macos-13
            label: macos-x64
            asset_suffix: macOS-x64
          - os: macos-14
            label: macos-arm64
            asset_suffix: macOS-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ui]" pyinstaller

      - name: Build GUI (one-file)
        run: pyinstaller --noconfirm packaging/deepmeerkat-gui.spec

      - name: Compute version label
        id: label
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "v=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.version_label }}" ]; then
            echo "v=${{ github.event.inputs.version_label }}" >> "$GITHUB_OUTPUT"
          else
            V=$(python -c "import tomllib; print('v'+tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
            echo "v=$V" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage artifact for upload
        shell: bash
        run: |
          set -euo pipefail
          V="${{ steps.label.outputs.v }}"
          SUFFIX="${{ matrix.asset_suffix }}"
          mkdir -p staging
          case "${{ runner.os }}" in
            Windows)
              cp "dist/deepmeerkat-gui.exe" "staging/DeepMeerkat-${V}-${SUFFIX}"
              ;;
            macOS)
              cp "dist/deepmeerkat-gui" "staging/DeepMeerkat-${V}-${SUFFIX}"
              chmod +x "staging/DeepMeerkat-${V}-${SUFFIX}"
              ;;
          esac

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepmeerkat-gui-${{ matrix.label }}-${{ steps.label.outputs.v }}
          path: staging/*

  attach-to-release:
    name: Attach installers to GitHub Release
    needs: [gui]
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          pattern: deepmeerkat-gui-*
          merge-multiple: true

      - name: List assets
        run: find assets -type f -ls

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
